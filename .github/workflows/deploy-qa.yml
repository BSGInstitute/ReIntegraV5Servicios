name: Deploy QA - IntegraV5Servicios

on:
  push:
    branches: [qa]

concurrency:
  group: deploy-qa
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v $HOME/.nuget/packages:/root/.nuget/packages \
            -w /src \
            mcr.microsoft.com/dotnet/sdk:8.0 \
            dotnet test BSI.Integra.PruebasUnitarias/BSI.Integra.PruebasUnitarias.csproj --verbosity normal

  # ── 2. Docker Build & Push ─────────────────────────────────────────────────
  build-push:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.sha-tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LOWER }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=qa-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa
          cache-to: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa,mode=max

      - name: Compute SHA image tag
        id: sha-tag
        run: echo "value=${{ env.IMAGE_LOWER }}:qa-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  # ── 3. Deploy (self-hosted runner en el servidor QA) ──────────────────────
  deploy:
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 10
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: docker pull ${{ needs.build-push.outputs.image-tag }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image-tag }}
        run: docker compose -f docker-compose.qa.yml up -d

      - name: Prune old images
        run: docker image prune -f
