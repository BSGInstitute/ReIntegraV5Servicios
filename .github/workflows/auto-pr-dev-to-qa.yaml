name: Auto PR dev → qa

on:
  pull_request:
    types: [closed]
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create or update PR dev → qa
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          EXISTING=$(gh pr list --base qa --head dev --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING ya existe — agregando comentario"
            gh pr comment "$EXISTING" --body \
              "**Nuevo merge incluido:** #${PR_NUMBER} — ${PR_TITLE} (@${PR_AUTHOR})"
          else
            BODY=$(printf '## Cambios incluidos\n\n- #%s %s (@%s)\n\n## Checklist\n- [ ] CI pasa\n- [ ] Revisado por Tech Lead' "$PR_NUMBER" "$PR_TITLE" "$PR_AUTHOR")
            gh pr create \
              --base qa \
              --head dev \
              --title "deploy: dev → qa" \
              --body "$BODY"
            echo "PR creado exitosamente"
          fi
